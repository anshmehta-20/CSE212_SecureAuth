<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in – SecureAuth</title>
  <meta name="description" content="SecureAuth enterprise authentication. AI-powered risk analysis on every login." />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='url(%23g)'/><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%233b82f6'/><stop offset='100%25' stop-color='%238b5cf6'/></linearGradient></defs><path d='M50 20a20 20 0 0 1 20 20v6h5a3 3 0 0 1 3 3v22a3 3 0 0 1-3 3H25a3 3 0 0 1-3-3V49a3 3 0 0 1 3-3h5v-6A20 20 0 0 1 50 20zm0 43a6 6 0 1 0 0-12 6 6 0 0 0 0 12zm13-23v-6a13 13 0 0 0-26 0v6h26z' fill='white'/></svg>" />
</head>
<body>

<main class="page">
  <div class="card card-sm">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-mark">
        <div class="brand-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <span class="brand-name">SecureAuth</span>
      </div>
      <h1>Sign in to your account</h1>
      <p>AI risk engine evaluates every authentication event in real time</p>
    </div>

    <!-- Alerts -->
    <div id="alert-container"></div>

    <!-- Form -->
    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input id="username" class="form-input" type="text" placeholder="enter your username"
               autocomplete="username" required />
        <span class="field-error" id="err-username">Username is required.</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <input id="password" class="form-input" type="password" placeholder="enter your password"
                 autocomplete="current-password" required />
          <button type="button" class="input-action" id="toggle-pwd" aria-label="Toggle password visibility">
            <svg id="eye-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="field-error" id="err-password">Password is required.</span>
      </div>

      <button type="submit" class="btn btn-primary" id="login-btn" style="margin-top:6px">
        <div class="btn-spinner"></div>
        <span class="btn-text">Sign in</span>
      </button>
    </form>

    <div class="divider"></div>

    <p class="text-sm text-muted text-center" style="margin-bottom:16px">
      Protected by a 3-model AI ensemble with SHAP explainability
    </p>

    <!-- Demo panel -->
    <div class="demo-panel">
      <div class="demo-panel-label">Demo accounts — click to fill</div>
      <div id="demo-rows"></div>
    </div>

  </div>
</main>

<!-- Result modal -->
<div id="result-modal" class="modal-backdrop">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-status-line">
        <div class="status-dot" id="modal-dot"></div>
        <span class="modal-title" id="modal-title"></span>
      </div>
      <p class="modal-subtitle" id="modal-subtitle"></p>
    </div>

    <div class="modal-section">
      <div class="modal-section-label">Risk Score</div>
      <div class="score-row">
        <div>
          <span class="score-num" id="modal-score">0</span>
          <span class="score-max"> / 100</span>
        </div>
        <div id="modal-badge"></div>
      </div>
      <div class="risk-bar-track">
        <div class="risk-bar-fill" id="modal-bar" style="width:0%"></div>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-label">AI Analysis</div>
      <div class="explanation-block" id="modal-expl">—</div>
    </div>

    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<script src="script.js"></script>
<script>
/* Demo row population */
const demos = [
  { status:'low',    label:'Low Risk',            user:'alice',   pwd:'SecurePass123!' },
  { status:'medium', label:'Medium Risk (MFA)',    user:'bob',     pwd:'Pass@2024' },
  { status:'high',   label:'High Risk (blocked)',  user:'charlie', pwd:'Admin@999' },
  { status:'admin',  label:'Admin account',        user:'admin',   pwd:'AdminSecure1!' },
];
const container = document.getElementById('demo-rows');
demos.forEach(d => {
  const row = document.createElement('div');
  row.className = 'demo-row';
  row.setAttribute('role', 'button');
  row.setAttribute('tabindex', '0');
  row.innerHTML = `
    <div class="demo-label-badge">
      <div class="demo-status ${d.status}"></div>
      <span class="demo-row-label">${d.label}</span>
    </div>
    <span class="demo-cred">${d.user} / ${d.pwd}</span>
  `;
  row.addEventListener('click', () => {
    document.getElementById('username').value = d.user;
    document.getElementById('password').value = d.pwd;
    document.getElementById('username').classList.remove('is-error');
    document.getElementById('err-username').classList.remove('visible');
    document.getElementById('password').classList.remove('is-error');
    document.getElementById('err-password').classList.remove('visible');
  });
  row.addEventListener('keydown', e => { if (e.key === 'Enter') row.click(); });
  container.appendChild(row);
});

/* Password toggle */
document.getElementById('toggle-pwd').addEventListener('click', function () {
  const inp = document.getElementById('password');
  const isText = inp.type === 'text';
  inp.type = isText ? 'password' : 'text';
  document.getElementById('eye-icon').innerHTML = isText
    ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
    : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
});

/* Close modal on backdrop */
document.getElementById('result-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.target.classList.remove('open');
});
</script>
</body>
</html>
